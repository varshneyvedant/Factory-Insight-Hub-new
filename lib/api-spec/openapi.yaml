openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Manufacturing management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: employees
  - name: attendance
  - name: salaries
  - name: advances
  - name: copper
  - name: dashboard
  - name: production
  - name: customers
  - name: orders
  - name: stock
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with role + password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204": { description: No Content }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Employee" }
    post:
      operationId: createEmployee
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployeeInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeDetail" }
    put:
      operationId: updateEmployee
      tags: [employees]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployeeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
    delete:
      operationId: deleteEmployee
      tags: [employees]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      parameters:
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AttendanceRecord" }
    post:
      operationId: recordAttendance
      tags: [attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttendanceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttendanceRecord" }
  /attendance/{id}:
    delete:
      operationId: deleteAttendance
      tags: [attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /salaries:
    get:
      operationId: listSalaryPayments
      tags: [salaries]
      parameters:
        - { name: employeeId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalaryPayment" }
    post:
      operationId: createSalaryPayment
      tags: [salaries]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SalaryPaymentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalaryPayment" }
  /salaries/{id}:
    delete:
      operationId: deleteSalaryPayment
      tags: [salaries]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /advances:
    get:
      operationId: listAdvances
      tags: [advances]
      parameters:
        - { name: employeeId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Advance" }
    post:
      operationId: createAdvance
      tags: [advances]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdvanceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Advance" }
  /advances/{id}:
    delete:
      operationId: deleteAdvance
      tags: [advances]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /copper:
    get:
      operationId: listCopperEntries
      tags: [copper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CopperEntry" }
    post:
      operationId: createCopperEntry
      tags: [copper]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CopperEntryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CopperEntry" }
  /copper/{id}:
    delete:
      operationId: deleteCopperEntry
      tags: [copper]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }
  /copper/stats:
    get:
      operationId: getCopperStats
      tags: [copper]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CopperStats" }

  /production:
    get:
      operationId: listProductionBatches
      tags: [production]
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: gauge, in: query, schema: { type: number } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ProductionBatch" }
    post:
      operationId: createProductionBatch
      tags: [production]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductionBatchInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductionBatch" }
  /production/{id}:
    delete:
      operationId: deleteProductionBatch
      tags: [production]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }
  /production/stats:
    get:
      operationId: getProductionStats
      tags: [production]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductionStats" }

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Customer" }
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
  /customers/{id}:
    put:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Customer" }
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      parameters:
        - { name: customerId, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalesOrder" }
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SalesOrderInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrder" }
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrder" }
    delete:
      operationId: deleteOrder
      tags: [orders]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: No Content }
  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderStatusUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalesOrder" }

  /stock:
    get:
      operationId: getStockSummary
      tags: [stock]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StockRow" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
  /dashboard/employee-balances:
    get:
      operationId: getEmployeeBalances
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmployeeBalance" }
  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LoginRequest:
      type: object
      properties:
        role: { type: string, enum: [owner, manager] }
        password: { type: string }
      required: [role, password]

    SessionUser:
      type: object
      properties:
        role: { type: string, enum: [owner, manager] }
      required: [role]

    Employee:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        position: { type: string }
        phone: { type: string, nullable: true }
        dailyWage: { type: number }
        monthlySalary: { type: number }
        joiningDate: { type: string, format: date }
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, position, dailyWage, monthlySalary, joiningDate, active, createdAt]

    EmployeeInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        position: { type: string, minLength: 1 }
        phone: { type: string, nullable: true }
        dailyWage: { type: number, minimum: 0 }
        monthlySalary: { type: number, minimum: 0 }
        joiningDate: { type: string, format: date }
        active: { type: boolean }
      required: [name, position, dailyWage, monthlySalary, joiningDate]

    EmployeeDetail:
      type: object
      properties:
        employee: { $ref: "#/components/schemas/Employee" }
        attendance:
          type: array
          items: { $ref: "#/components/schemas/AttendanceRecord" }
        salaryPayments:
          type: array
          items: { $ref: "#/components/schemas/SalaryPayment" }
        advances:
          type: array
          items: { $ref: "#/components/schemas/Advance" }
        balance: { $ref: "#/components/schemas/EmployeeBalance" }
      required: [employee, attendance, salaryPayments, advances, balance]

    AttendanceRecord:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeName: { type: string }
        date: { type: string, format: date }
        status: { type: string, enum: [present, absent, half_day] }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, employeeId, employeeName, date, status, createdAt]

    AttendanceInput:
      type: object
      properties:
        employeeId: { type: integer }
        date: { type: string, format: date }
        status: { type: string, enum: [present, absent, half_day] }
        notes: { type: string, nullable: true }
      required: [employeeId, date, status]

    SalaryPayment:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeName: { type: string }
        amount: { type: number }
        paymentDate: { type: string, format: date }
        periodMonth: { type: string }
        status: { type: string, enum: [paid, pending] }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, employeeId, employeeName, amount, paymentDate, periodMonth, status, createdAt]

    SalaryPaymentInput:
      type: object
      properties:
        employeeId: { type: integer }
        amount: { type: number, minimum: 0 }
        paymentDate: { type: string, format: date }
        periodMonth: { type: string, description: "YYYY-MM" }
        status: { type: string, enum: [paid, pending] }
        notes: { type: string, nullable: true }
      required: [employeeId, amount, paymentDate, periodMonth, status]

    Advance:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeName: { type: string }
        amount: { type: number }
        date: { type: string, format: date }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, employeeId, employeeName, amount, date, createdAt]

    AdvanceInput:
      type: object
      properties:
        employeeId: { type: integer }
        amount: { type: number, minimum: 0 }
        date: { type: string, format: date }
        notes: { type: string, nullable: true }
      required: [employeeId, amount, date]

    CopperEntry:
      type: object
      properties:
        id: { type: integer }
        date: { type: string, format: date }
        marketPrice: { type: number }
        purchasePrice: { type: number }
        quantityKg: { type: number }
        vendor: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, date, marketPrice, purchasePrice, quantityKg, createdAt]

    CopperEntryInput:
      type: object
      properties:
        date: { type: string, format: date }
        marketPrice: { type: number, minimum: 0 }
        purchasePrice: { type: number, minimum: 0 }
        quantityKg: { type: number, minimum: 0 }
        vendor: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [date, marketPrice, purchasePrice, quantityKg]

    CopperStats:
      type: object
      properties:
        currentPrice: { type: number, nullable: true }
        currentMarketPrice: { type: number, nullable: true }
        averagePurchasePrice: { type: number, nullable: true }
        averageMarketPrice: { type: number, nullable: true }
        diffFromAverage: { type: number, nullable: true }
        diffPercent: { type: number, nullable: true }
        trend: { type: string, enum: [up, down, flat, none] }
        totalEntries: { type: integer }
        totalQuantityKg: { type: number }
        totalSpend: { type: number }
        last30Days:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              marketPrice: { type: number }
              purchasePrice: { type: number }
            required: [date, marketPrice, purchasePrice]
      required: [trend, totalEntries, totalQuantityKg, totalSpend, last30Days]

    EmployeeBalance:
      type: object
      properties:
        employeeId: { type: integer }
        employeeName: { type: string }
        position: { type: string }
        monthlySalary: { type: number }
        totalEarned: { type: number }
        totalPaid: { type: number }
        totalAdvances: { type: number }
        remainingDue: { type: number }
        daysPresent: { type: integer }
        daysAbsent: { type: integer }
      required: [employeeId, employeeName, position, monthlySalary, totalEarned, totalPaid, totalAdvances, remainingDue, daysPresent, daysAbsent]

    DashboardSummary:
      type: object
      properties:
        totalEmployees: { type: integer }
        activeEmployees: { type: integer }
        totalSalaryPaid: { type: number }
        totalSalaryPending: { type: number }
        totalAdvancesGiven: { type: number }
        copperCurrentPrice: { type: number, nullable: true }
        copperAveragePrice: { type: number, nullable: true }
        copperTrend: { type: string, enum: [up, down, flat, none] }
        attendanceToday:
          type: object
          properties:
            present: { type: integer }
            absent: { type: integer }
            halfDay: { type: integer }
          required: [present, absent, halfDay]
        monthlyPayments:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              paid: { type: number }
              advances: { type: number }
            required: [month, paid, advances]
      required: [totalEmployees, activeEmployees, totalSalaryPaid, totalSalaryPending, totalAdvancesGiven, copperTrend, attendanceToday, monthlyPayments]

    ProductionBatch:
      type: object
      properties:
        id: { type: integer }
        date: { type: string, format: date }
        gauge: { type: number }
        copperInputKg: { type: number }
        outputKg: { type: number }
        scrapKg: { type: number }
        operatorId: { type: integer, nullable: true }
        operatorName: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, date, gauge, copperInputKg, outputKg, scrapKg, createdAt]

    ProductionBatchInput:
      type: object
      properties:
        date: { type: string, format: date }
        gauge: { type: number, minimum: 0 }
        copperInputKg: { type: number, minimum: 0 }
        outputKg: { type: number, minimum: 0 }
        scrapKg: { type: number, minimum: 0 }
        operatorId: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
      required: [date, gauge, copperInputKg, outputKg]

    ProductionStats:
      type: object
      properties:
        totalBatches: { type: integer }
        totalCopperInputKg: { type: number }
        totalOutputKg: { type: number }
        totalScrapKg: { type: number }
        yieldPercent: { type: number }
        last30Days:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              outputKg: { type: number }
              scrapKg: { type: number }
            required: [date, outputKg, scrapKg]
        byGauge:
          type: array
          items:
            type: object
            properties:
              gauge: { type: number }
              outputKg: { type: number }
            required: [gauge, outputKg]
      required: [totalBatches, totalCopperInputKg, totalOutputKg, totalScrapKg, yieldPercent, last30Days, byGauge]

    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        gstin: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        totalOrders: { type: integer }
        totalValue: { type: number }
        createdAt: { type: string, format: date-time }
      required: [id, name, totalOrders, totalValue, createdAt]

    CustomerInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        gstin: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [name]

    SalesOrderItem:
      type: object
      properties:
        id: { type: integer }
        gauge: { type: number }
        quantityKg: { type: number }
        pricePerKg: { type: number }
        lineTotal: { type: number }
      required: [id, gauge, quantityKg, pricePerKg, lineTotal]

    SalesOrderItemInput:
      type: object
      properties:
        gauge: { type: number, minimum: 0 }
        quantityKg: { type: number, minimum: 0 }
        pricePerKg: { type: number, minimum: 0 }
      required: [gauge, quantityKg, pricePerKg]

    SalesOrder:
      type: object
      properties:
        id: { type: integer }
        customerId: { type: integer }
        customerName: { type: string }
        orderDate: { type: string, format: date }
        status: { type: string, enum: [pending, dispatched, cancelled] }
        notes: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/SalesOrderItem" }
        totalQuantityKg: { type: number }
        totalValue: { type: number }
        createdAt: { type: string, format: date-time }
      required: [id, customerId, customerName, orderDate, status, items, totalQuantityKg, totalValue, createdAt]

    SalesOrderInput:
      type: object
      properties:
        customerId: { type: integer }
        orderDate: { type: string, format: date }
        status: { type: string, enum: [pending, dispatched, cancelled] }
        notes: { type: string, nullable: true }
        items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SalesOrderItemInput" }
      required: [customerId, orderDate, status, items]

    OrderStatusUpdate:
      type: object
      properties:
        status: { type: string, enum: [pending, dispatched, cancelled] }
      required: [status]

    StockRow:
      type: object
      properties:
        gauge: { type: number }
        producedKg: { type: number }
        dispatchedKg: { type: number }
        pendingKg: { type: number }
        availableKg: { type: number }
      required: [gauge, producedKg, dispatchedKg, pendingKg, availableKg]

    ActivityItem:
      type: object
      properties:
        id: { type: string }
